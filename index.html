<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculo - All-in-One Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <!-- Dark/Light Mode Toggle -->
    <div class="toggle-btn">
        <span class="toggle-text">🌞 / 🌙</span>
        <input type="checkbox" id="modeToggle">
        <label for="modeToggle"></label>
    </div>

    <div class="container">
        <h2 class="text-center mb-4 fw-bold text-primary">💡 Calculo - Your Smart Utility Calculator</h2>

        <!-- Tab Navigation -->
        <ul class="nav nav-pills justify-content-center" id="calculatorTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="emi-tab" data-bs-toggle="pill" data-bs-target="#emi" type="button"
                    role="tab">📈 EMI</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="bmi-tab" data-bs-toggle="pill" data-bs-target="#bmi" type="button"
                    role="tab">⚖️ BMI</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="age-tab" data-bs-toggle="pill" data-bs-target="#age" type="button"
                    role="tab">🎂 Age</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="discount-tab" data-bs-toggle="pill" data-bs-target="#discount"
                    type="button" role="tab">💸 Discount</button>
            </li>
        </ul>

        <!-- Tab Contents -->
        <div class="tab-content mt-4" id="calculatorTabsContent">

            <!-- EMI -->
            <div class="tab-pane fade show active" id="emi" role="tabpanel">
                <h4>EMI Calculator</h4>
                <div class="row">
                    <div class="col-md-4"><input type="number" id="loan" class="form-control mb-2"
                            placeholder="Loan Amount"></div>
                    <div class="col-md-4"><input type="number" id="rate" class="form-control mb-2"
                            placeholder="Annual Interest Rate (%)"></div>
                    <div class="col-md-4"><input type="number" id="time" class="form-control mb-2"
                            placeholder="Tenure (Years)"></div>
                </div>
                <button onclick="calculateEMI()" class="btn btn-success w-100">Calculate EMI</button>
                <div class="mt-3" id="emiResult"></div>
            </div>

            <!-- BMI -->
            <div class="tab-pane fade" id="bmi" role="tabpanel">
                <h4>BMI Calculator</h4>
                <div class="row">
                    <div class="col-md-6"><input type="number" id="height" class="form-control mb-2"
                            placeholder="Height (cm)"></div>
                    <div class="col-md-6"><input type="number" id="weight" class="form-control mb-2"
                            placeholder="Weight (kg)"></div>
                </div>
                <button onclick="calculateBMI()" class="btn btn-success w-100">Calculate BMI</button>
                <div class="mt-3" id="bmiResult"></div>
            </div>

            <!-- Age -->
            <div class="tab-pane fade" id="age" role="tabpanel">
                <h4>Age Calculator</h4>
                <input type="date" id="dob" class="form-control mb-2">
                <button onclick="calculateAge()" class="btn btn-success w-100">Calculate Age</button>
                <div class="mt-3" id="ageResult"></div>
            </div>

            <!-- Discount -->
            <div class="tab-pane fade" id="discount" role="tabpanel">
                <h4>Discount Calculator</h4>
                <div class="row">
                    <div class="col-md-6"><input type="number" id="original" class="form-control mb-2"
                            placeholder="Original Price"></div>
                    <div class="col-md-6"><input type="number" id="discountPercent" class="form-control mb-2"
                            placeholder="Discount %"></div>
                </div>
                <button onclick="calculateDiscount()" class="btn btn-success w-100">Calculate Discount</button>
                <div class="mt-3" id="discountResult"></div>
            </div>

        </div>

        <footer>
            <p>💻 Developed by Mobarak Hossain | Calculo © 2025</p>
        </footer>
    </div>

    <script>
        const toggle = document.getElementById('modeToggle');
        const htmlEl = document.documentElement;
      
        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          htmlEl.setAttribute('data-theme', savedTheme);
          toggle.checked = savedTheme === 'dark';
        }
      
        // Update on toggle
        toggle.addEventListener('change', () => {
          const mode = toggle.checked ? 'dark' : 'light';
          htmlEl.setAttribute('data-theme', mode);
          localStorage.setItem('theme', mode);
        });
      </script>
      

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script src="emi.js"></script>
    <script src="bmi.js"></script>
    <script src="age.js"></script>
    <script src="discount.js"></script>
</body>

</html>
